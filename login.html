<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SQL Migrator</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-shell">
  <main class="auth-card" role="main">
    <h1>Welcome Back</h1>
    <p>Sign in to continue to SQL Migrator.</p>
    <div id="auth-message"></div>
    <form id="login-form" class="form-grid" aria-label="Login form">
      <div class="input-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required />
      </div>
      <fieldset class="radio-group" aria-label="Select role">
        <label><input type="radio" name="role" value="User" checked /> User</label>
        <label><input type="radio" name="role" value="Admin" /> Admin</label>
      </fieldset>
      <div class="action-row">
        <button type="submit" class="button-primary">Login</button>
        <a href="register.html" class="button-secondary">Register</a>
      </div>
    </form>
    <div class="auth-footer">
      <a href="forgot_password.html">Forgot Password?</a>
      <p class="auth-note">Use your application credentials to sign in.</p>
    </div>
  </main>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script>initAuthPage();</script>
</body>
</html>
